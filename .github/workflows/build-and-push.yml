name: Build and push container

# Builds the multistage Dockerfile and publishes to GHCR on every push to main.
# Render's "Deploy on push" feature watches the latest tag and auto-deploys.
#
# Tests run as a separate job that gates the image push — if any of the 3
# backend test suites fail, we don't ship.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test all 3 backend services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 + Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Test discussions-service (Testcontainers needs docker-in-docker)
        run: ./mvnw -B -ntp test
        working-directory: discussions-service

      - name: Test discussions-graph
        run: ./mvnw -B -ntp test
        working-directory: discussions-graph

      - name: Test genai-service
        run: ./mvnw -B -ntp test
        working-directory: genai-service

  ui:
    name: Build discussions-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: discussions-ui/package-lock.json

      - run: npm ci
        working-directory: discussions-ui

      - run: npm run codegen
        working-directory: discussions-ui

      - run: npm run build
        working-directory: discussions-ui

  image:
    name: Build & push container image
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
