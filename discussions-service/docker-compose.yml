services:
  postgres:
    image: postgres:16-alpine
    container_name: anoncircles-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anoncircles
    ports:
      - "5432:5432"
    volumes:
      - anoncircles_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anoncircles"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  anoncircles_pgdata:
