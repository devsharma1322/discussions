spring:
  graphql:
    schema:
      introspection:
        enabled: false
    graphiql:
      enabled: false

graph:
  # No defaults — fail fast on missing env in prod. Render env must supply:
  #   DISCUSSIONS_SERVICE_URL, GENAI_SERVICE_URL, INTERNAL_SERVICE_TOKEN, UI_ORIGIN
  discussions-service-url: ${DISCUSSIONS_SERVICE_URL}
  genai-service-url: ${GENAI_SERVICE_URL}
  internal-auth-token: ${INTERNAL_SERVICE_TOKEN}
  ui-origin: ${UI_ORIGIN}
  query:
    depth-limit:
      enabled: true
      max: 7
    complexity-limit:
      enabled: true
      max: 200

logging:
  level:
    root: INFO
    com.anoncircles: INFO

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
endpoints:
    web:
      # Spring Boot actuator endpoints are served by a separate handler chain
      # that bypasses the standard WebFlux CorsRegistry mappings, so we have
      # to configure their CORS policy here. Mirrors the allowlist used for
      # /graphql in CorsConfig.java so the WakingSplash health probe works
      # from the Vercel-deployed UI.
      cors:
        allowed-origins: ${UI_ORIGIN}
        allowed-methods: GET
        max-age: 3600s
